<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Properties</title>

  <link rel="stylesheet" href="./css/style.css">
</head>

<body>

  <nav class="navbar">
    <div class="logo">Dream Homes</div>

    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="properties.html">Properties</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <section class="properties-page">

    <h1>Available Properties</h1>

    <div class="filter-box">
      <input type="text" id="searchInput" placeholder="Search Property">

      <button onclick="filterProperties()">
        Search
      </button>
    </div>

    <div class="property-container">

      <div class="property-card searchable">
        <img src="./images/house1.jpg">

        <div class="property-info">
          <h3>Modern Villa</h3>
          <p>$450,000</p>

          <a href="property-details.html" class="btn-small">
            View Details
          </a>
        </div>
      </div>

      <div class="property-card searchable">
        <img src="./images/house2.jpg">

        <div class="property-info">
          <h3>Luxury Apartment</h3>
          <p>$320,000</p>

          <a href="property-details.html" class="btn-small">
            View Details
          </a>
        </div>
      </div>

      <div class="property-card searchable">
        <img src="./images/house3.jpg">

        <div class="property-info">
          <h3>Family House</h3>
          <p>$500,000</p>

          <a href="property-details.html" class="btn-small">
            View Details
          </a>
        </div>
      </div>

    </div>

  </section>

  <script src="./js/script.js"></script>

</body>
</html>
